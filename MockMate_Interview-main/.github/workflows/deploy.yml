name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./MockMate_Interview-main/backend
          file: ./MockMate_Interview-main/backend/Dockerfile.prod
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/mockmate-backend:latest
            ${{ env.DOCKER_USERNAME }}/mockmate-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./MockMate_Interview-main/frontend
          file: ./MockMate_Interview-main/frontend/Dockerfile.prod
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/mockmate-frontend:latest
            ${{ env.DOCKER_USERNAME }}/mockmate-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /home/mockmate && docker pull ${{ env.DOCKER_USERNAME }}/mockmate-backend:latest && docker pull ${{ env.DOCKER_USERNAME }}/mockmate-frontend:latest && docker compose -f docker-compose.prod.yml down && docker compose -f docker-compose.prod.yml up -d"
