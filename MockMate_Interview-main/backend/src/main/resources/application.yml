server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mockmate}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  jwt:
    secret: ${JWT_SECRET:mockmate-super-secret-key-change-this-before-production-1234567890}
    expiration-hours: 24
  matchmaking:
    poll-ms: 1500

logging:
  level:
    root: INFO
    com.mockmate: DEBUG
