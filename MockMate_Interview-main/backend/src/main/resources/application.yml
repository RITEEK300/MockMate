server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mockmate}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  jwt:
    secret: ${JWT_SECRET:mockmate-dev-secret-change-this}
    expiration-hours: 24
  dev-reset-enabled: ${DEV_RESET_ENABLED:false}
  matchmaking:
    poll-ms: 1500
